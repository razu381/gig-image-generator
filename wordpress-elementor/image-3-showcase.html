<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordPress & Elementor Gig Image 3</title>
  <link href="../output.css" rel="stylesheet">
  <link href="../base.css" rel="stylesheet">

  <!-- Icon Libraries -->
  <!-- Devicon (official tech brand logos, colored) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"/>

  <!-- Tabler Icons (clean UI icons) -->
  <script src="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/icons-react/dist/index.umd.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/dist/tabler-icons.min.css"/>
</head>
<body>
  <div class="canvas bg-grid" style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  ">
    <!-- Left-side ambient glow for balance -->
    <div class="bg-left-glow"></div>
    <!-- Top Row -->
    <div style="
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 1140px;
    ">
      <!-- Left: Eyebrow -->
      <div class="eyebrow">Live result preview</div>

      <!-- Right: Review Badge -->
      <div class="review-badge">
        <span class="review-badge__text">★ 70+ Five-Star Reviews</span>
      </div>
    </div>

    <!-- Center - Browser Mockup -->
    <div class="browser-mockup" style="
      width: 1140px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,234,28,0.08);
      display: flex;
      flex-direction: column;
    ">
      <!-- Chrome Bar -->
      <div style="
        height: 38px;
        background: #111111;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
      ">
        <!-- Chrome Dots -->
        <div class="chrome-dot chrome-dot--red"></div>
        <div class="chrome-dot chrome-dot--yellow"></div>
        <div class="chrome-dot chrome-dot--green"></div>

        <!-- Address Bar -->
        <div style="
          flex: 1;
          height: 26px;
          background: #161616;
          border-radius: 10px;
          display: flex;
          align-items: center;
          padding: 0 14px;
        ">
          <span style="
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #444444;
          ">yourclient.com</span>
        </div>

        <!-- Right Text -->
        <span style="
          font-family: 'JetBrains Mono', monospace;
          font-size: 13px;
          color: #555555;
          margin-right: 16px;
        ">WordPress + Elementor</span>
      </div>

      <!-- Website Content Area -->
      <div style="
        height: 340px;
        background: #ffffff;
        display: flex;
        flex-direction: column;
      ">
        <!-- Navbar -->
        <div style="
          height: 52px;
          background: #ffffff;
          border-bottom: 1px solid #e5e7eb;
          padding: 0 32px;
          display: flex;
          align-items: center;
          justify-content: space-between;
        ">
          <!-- Logo Bar -->
          <div style="
            width: 80px;
            height: 10px;
            background: #111827;
            border-radius: 2px;
          "></div>

          <!-- Right: Nav Items + CTA -->
          <div style="display: flex; gap: 20px; align-items: center;">
            <!-- 4 Nav Items -->
            <div style="width: 48px; height: 7px; background: #d1d5db; border-radius: 2px;"></div>
            <div style="width: 48px; height: 7px; background: #d1d5db; border-radius: 2px;"></div>
            <div style="width: 48px; height: 7px; background: #d1d5db; border-radius: 2px;"></div>
            <div style="width: 48px; height: 7px; background: #d1d5db; border-radius: 2px;"></div>

            <!-- CTA Button -->
            <div style="
              width: 90px;
              height: 30px;
              background: #00ea1c;
              border-radius: 4px;
            "></div>
          </div>
        </div>

        <!-- Hero -->
        <div style="
          height: 160px;
          background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
          padding: 28px 32px;
          display: flex;
          align-items: center;
          justify-content: space-between;
        ">
          <!-- Left Side -->
          <div style="display: flex; flex-direction: column; gap: 10px;">
            <!-- H1 Bar 1 -->
            <div style="
              width: 55%;
              height: 14px;
              background: #111827;
              border-radius: 3px;
            "></div>
            <!-- H1 Bar 2 -->
            <div style="
              width: 40%;
              height: 14px;
              background: #111827;
              border-radius: 3px;
            "></div>
            <!-- Subtitle -->
            <div style="
              width: 50%;
              height: 8px;
              background: #94a3b8;
              border-radius: 2px;
            "></div>
            <!-- Subtitle 2 -->
            <div style="
              width: 38%;
              height: 8px;
              background: #94a3b8;
              border-radius: 2px;
            "></div>
            <!-- CTA Row -->
            <div style="display: flex; gap: 10px; margin-top: 6px;">
              <!-- Primary Button -->
              <div style="
                width: 110px;
                height: 34px;
                background: #00ea1c;
                border-radius: 5px;
              "></div>
              <!-- Ghost Button -->
              <div style="
                width: 90px;
                height: 34px;
                border: 1px solid #d1d5db;
                border-radius: 5px;
              "></div>
            </div>
          </div>

          <!-- Right Side: Card -->
          <div style="
            width: 220px;
            height: 110px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
          ">
            <div style="width: 80%; height: 8px; background: #e5e7eb; border-radius: 2px;"></div>
            <div style="width: 60%; height: 8px; background: #e5e7eb; border-radius: 2px;"></div>
            <div style="width: 40%; height: 8px; background: #e5e7eb; border-radius: 2px;"></div>
            <div style="margin-top: auto;">
              <div style="width: 40px; height: 18px; background: #00ea1c; border-radius: 3px;"></div>
            </div>
          </div>
        </div>

        <!-- Feature Cards Row -->
        <div style="
          flex: 1;
          height: 100px;
          background: #f8fafc;
          border-top: 1px solid #e5e7eb;
          padding: 0 32px;
          display: flex;
          align-items: center;
          gap: 20px;
        ">
          <!-- Feature Card 1 -->
          <div style="
            flex: 1;
            height: 68px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
          ">
            <div style="width: 50%; height: 9px; background: #111827; border-radius: 2px;"></div>
            <div style="width: 70%; height: 7px; background: #d1d5db; border-radius: 2px;"></div>
          </div>

          <!-- Feature Card 2 -->
          <div style="
            flex: 1;
            height: 68px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
          ">
            <div style="width: 50%; height: 9px; background: #111827; border-radius: 2px;"></div>
            <div style="width: 70%; height: 7px; background: #d1d5db; border-radius: 2px;"></div>
          </div>

          <!-- Feature Card 3 -->
          <div style="
            flex: 1;
            height: 68px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
          ">
            <div style="width: 50%; height: 9px; background: #111827; border-radius: 2px;"></div>
            <div style="width: 70%; height: 7px; background: #d1d5db; border-radius: 2px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Row - Chips -->
    <div style="
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      width: 1140px;
    ">
      <div class="chip">WordPress</div>
      <div class="chip">Elementor Pro</div>
      <div class="chip">WooCommerce</div>
      <div class="chip">Crocoblock</div>
      <div class="chip">Figma to WP</div>
      <div class="chip">Responsive</div>
      <div class="chip">Speed Optimized</div>
      <div class="chip">70+ Reviews</div>
    </div>
  </div>
</body>
</html>
