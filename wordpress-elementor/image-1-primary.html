<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordPress & Elementor Gig Image 1</title>
  <link href="../output.css" rel="stylesheet">
  <link href="../base.css" rel="stylesheet">

  <!-- Icon Libraries -->
  <!-- Devicon (official tech brand logos, colored) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"/>

  <!-- Tabler Icons (clean UI icons) -->
  <script src="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/icons-react/dist/index.umd.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/dist/tabler-icons.min.css"/>
</head>
<body>
  <div class="canvas bg-grid" style="background: #0a0a0a;">
    <!-- Left-side ambient glow for balance -->
    <div class="bg-left-glow"></div>
    <!-- Radial gradient overlay for green warmth in corners -->
    <div style="
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 900px 600px at 20% 50%, rgba(0,234,28,0.04) 0%, transparent 70%),
                  radial-gradient(ellipse 600px 800px at 85% 50%, rgba(0,234,28,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    "></div>
    <!-- Left Content Column -->
    <div class="left-content" style="
      width: 820px;
      max-width: 820px;
      overflow: hidden;
      padding-left: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 769px;
      gap: 0;
      z-index: 1;
    ">
      <!-- Row 1 - Eyebrow Label -->
      <div style="margin-bottom: 16px;">
        <div class="eyebrow">WordPress & Elementor Development</div>
      </div>

      <!-- Row 2 - Service Label -->
      <div style="
        margin-bottom: 8px;
        font-family: 'Syne', sans-serif;
        font-weight: 600;
        font-size: 20px;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      ">
        PROFESSIONAL
      </div>

      <!-- Row 3 - Hero Headline -->
      <div style="margin-bottom: 20px; font-family: 'Syne', sans-serif;">
        <div style="
          font-weight: 800;
          font-size: 72px;
          color: #f0f0f0;
          text-transform: uppercase;
          line-height: 0.95;
          letter-spacing: -2px;
        ">
          WORDPRESS
        </div>
        <div style="
          font-weight: 800;
          font-size: 82px;
          color: #00ea1c;
          text-transform: uppercase;
          line-height: 0.95;
          letter-spacing: -2px;
        ">
          WEBSITES
        </div>
      </div>

      <!-- Row 4 - Feature Lines (Pills) -->
      <div style="margin-bottom: 32px; display: flex; flex-direction: column; gap: 10px;">
        <div style="
          display: inline-flex;
          align-items: center;
          gap: 10px;
          background: rgba(0, 234, 28, 0.06);
          border: 1px solid rgba(0, 234, 28, 0.20);
          border-radius: 6px;
          padding: 10px 18px;
          max-width: 580px;
        ">
          <i class="ti ti-circle-check-filled" style="color: #00ea1c; font-size: 16px;"></i>
          <span style="
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            color: #cccccc;
          ">Pixel-perfect Figma to WordPress conversion</span>
        </div>
        <div style="
          display: inline-flex;
          align-items: center;
          gap: 10px;
          background: rgba(0, 234, 28, 0.06);
          border: 1px solid rgba(0, 234, 28, 0.20);
          border-radius: 6px;
          padding: 10px 18px;
          max-width: 580px;
        ">
          <i class="ti ti-circle-check-filled" style="color: #00ea1c; font-size: 16px;"></i>
          <span style="
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            color: #cccccc;
          ">Elementor · WooCommerce · Crocoblock · Custom themes</span>
        </div>
      </div>

      <!-- Row 5 - Logo Row -->
      <div style="display: flex; gap: 12px;">
        <!-- WordPress -->
        <div class="logo-circle" style="
          width: 56px;
          height: 56px;
          border-radius: 50%;
          background: linear-gradient(135deg, rgba(0,234,28,0.25) 0%, rgba(0,234,28,0.08) 100%);
          border: 1px solid rgba(0,234,28,0.20);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 6px 24px rgba(0,234,28,0.20), 0 0 40px rgba(0,234,28,0.10);
        ">
          <i class="devicon-wordpress-plain colored" style="font-size: 30px;"></i>
        </div>

        <!-- Elementor -->
        <div class="logo-circle" style="
          width: 56px;
          height: 56px;
          border-radius: 50%;
          background: linear-gradient(135deg, rgba(0,234,28,0.25) 0%, rgba(0,234,28,0.08) 100%);
          border: 1px solid rgba(0,234,28,0.20);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 6px 24px rgba(0,234,28,0.20), 0 0 40px rgba(0,234,28,0.10);
        ">
          <i class="devicon-elementor-plain colored" style="font-size: 30px;"></i>
        </div>

        <!-- WooCommerce -->
        <div class="logo-circle" style="
          width: 56px;
          height: 56px;
          border-radius: 50%;
          background: linear-gradient(135deg, rgba(0,234,28,0.25) 0%, rgba(0,234,28,0.08) 100%);
          border: 1px solid rgba(0,234,28,0.20);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 6px 24px rgba(0,234,28,0.20), 0 0 40px rgba(0,234,28,0.10);
        ">
          <i class="devicon-woocommerce-plain colored" style="font-size: 30px;"></i>
        </div>

        <!-- Figma -->
        <div class="logo-circle" style="
          width: 56px;
          height: 56px;
          border-radius: 50%;
          background: linear-gradient(135deg, rgba(0,234,28,0.25) 0%, rgba(0,234,28,0.08) 100%);
          border: 1px solid rgba(0,234,28,0.20);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 6px 24px rgba(0,234,28,0.20), 0 0 40px rgba(0,234,28,0.10);
        ">
          <i class="devicon-figma-plain colored" style="font-size: 30px;"></i>
        </div>

        <!-- Crocoblock (fallback badge) -->
        <div class="logo-circle" style="
          width: 56px;
          height: 56px;
          border-radius: 50%;
          background: linear-gradient(135deg, rgba(0,234,28,0.25) 0%, rgba(0,234,28,0.08) 100%);
          border: 1px solid rgba(0,234,28,0.20);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 6px 24px rgba(0,234,28,0.20), 0 0 40px rgba(0,234,28,0.10);
        ">
          <div style="
            width: 34px;
            height: 34px;
            border-radius: 6px;
            background: linear-gradient(135deg, rgba(0,234,28,0.30) 0%, rgba(0,234,28,0.12) 100%);
            border: 1px solid rgba(0,234,28,0.60);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,234,28,0.25);
          ">
            <span style="
              font-family: 'JetBrains Mono', monospace;
              font-weight: 700;
              font-size: 14px;
              color: #00ea1c;
            ">CB</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Photo Column -->
    <div class="photo-column" style="
      width: 340px;
      height: 769px;
      position: absolute;
      right: 0;
      top: 0;
    ">
      <!-- Photo glow effect (behind photo) -->
      <div style="
        position: absolute;
        top: 0;
        right: 0;
        width: 420px;
        height: 100%;
        background: radial-gradient(ellipse 340px 500px at 80% 40%, rgba(0,234,28,0.18) 0%, transparent 65%);
        z-index: 0;
        pointer-events: none;
      "></div>
      
      <!-- Developer Photo -->
      <img id="developer-photo" src="../images/shohidul-i-razu.png" alt="Developer photo" style="
        width: 340px;
        height: 769px;
        object-fit: cover;
        object-position: center top;
        display: block;
        z-index: 1;
        position: relative;
      ">

      <!-- Gradient overlay (always present for blend effect) -->
      <div style="
        position: absolute;
        top: 0;
        left: 0;
        width: 120px;
        height: 100%;
        background: linear-gradient(90deg, #0a0a0a 0%, transparent 100%);
        z-index: 2;
        pointer-events: none;
      "></div>
    </div>

    <!-- Top-right Review Badge -->
    <div style="
      position: absolute;
      top: 28px;
      right: 368px;
      z-index: 10;
    ">
      <div class="review-badge">
        <span class="review-badge__text">★ 70+ Five-Star Reviews</span>
      </div>
    </div>

    <!-- Bottom Accent Line -->
    <div class="accent-line-bottom"></div>
  </div>
</body>
</html>
