<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gig Image - Premium WordPress Migration</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root{
      --bg: #0d0f12;
      --panel: rgba(255,255,255,0.05);
      --panel-2: rgba(255,255,255,0.075);
      --line: rgba(255,255,255,0.08);
      --text: #f5f7fb;
      --muted: rgba(245,247,251,0.68);
      --accent: #00ea1c;
      --accent-2: #15c73a;
      --dark: #111417;
      --shadow: 0 30px 80px rgba(0,0,0,0.48);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
    }

    body{
      display:grid;
      place-items:center;
      min-height:100vh;
      background:
        radial-gradient(circle at 15% 15%, rgba(0,234,28,0.12), transparent 26%),
        radial-gradient(circle at 85% 25%, rgba(0,234,28,0.10), transparent 28%),
        radial-gradient(circle at 50% 75%, rgba(0,234,28,0.07), transparent 30%),
        linear-gradient(180deg, #0b0d10 0%, #111419 100%);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 14px;
      overflow:hidden;
    }

    .gig-card{
      width:min(1280px, calc(100vw - 28px));
      aspect-ratio: 4 / 3;
      position:relative;
      overflow:hidden;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)),
        linear-gradient(180deg, #111419 0%, #0e1115 100%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 58px);
    }

    .gig-card::before{
      content:'';
      position:absolute;
      inset:-20%;
      background:
        radial-gradient(circle at 72% 42%, rgba(0,234,28,0.18) 0%, transparent 24%),
        radial-gradient(circle at 20% 18%, rgba(0,234,28,0.10) 0%, transparent 20%),
        radial-gradient(circle at 68% 84%, rgba(0,234,28,0.08) 0%, transparent 18%);
      filter: blur(12px);
      pointer-events:none;
    }

    .gig-card::after{
      content:'';
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.36), transparent 75%);
      pointer-events:none;
      opacity: 0.45;
    }

    .decor-dots{
      position:absolute;
      top: clamp(14px, 2.5vw, 36px);
      right: clamp(14px, 2.5vw, 36px);
      display:grid;
      grid-template-columns: repeat(5, 7px);
      gap: 10px;
      opacity:0.28;
      z-index:1;
    }

    .decor-dots span{
      width:7px;
      height:7px;
      border-radius:50%;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(0,234,28,0.45);
    }

    .hero{
      position:relative;
      z-index:2;
      display:flex;
      flex-direction:column;
      height:100%;
      justify-content:space-between;
      gap: 18px;
    }

    .heading{
      text-align:center;
      margin-top: 4px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 8px 14px;
      border-radius:999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: clamp(11px, 1vw, 14px);
      font-weight:600;
      letter-spacing:0.16em;
      text-transform:uppercase;
      margin-bottom: 18px;
      backdrop-filter: blur(12px);
    }

    .eyebrow::before{
      content:'';
      width:8px;
      height:8px;
      border-radius:50%;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(0,234,28,0.8);
      flex: 0 0 auto;
    }

    .title{
      font-size: clamp(22px, 4.9vw, 60px);
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: -0.05em;
      color: var(--text);
      text-wrap: balance;
      margin-bottom: 12px;
    }

    .title .accent{
      display:inline-flex;
      align-items:center;
      padding: 0.08em 0.28em;
      margin-left: 6px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #0f120f;
      box-shadow:
        0 10px 30px rgba(0,234,28,0.22),
        inset 0 1px 0 rgba(255,255,255,0.22);
    }

    .subtitle{
      font-size: clamp(11px, 1.6vw, 19px);
      line-height:1.45;
      color: var(--muted);
      letter-spacing: 0.02em;
      max-width: 820px;
      margin: 0 auto;
    }

    .content{
      display:grid;
      grid-template-columns: minmax(260px, 1.15fr) minmax(120px, 0.55fr) minmax(220px, 0.9fr);
      align-items:center;
      gap: clamp(14px, 2vw, 30px);
      padding-top: 10px;
      padding-bottom: 8px;
    }

    .panel{
      background: linear-gradient(180deg, var(--panel), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
    }

    .platforms{
      padding: clamp(12px, 1.6vw, 18px);
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    .platform-bar{
      display:flex;
      align-items:center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      transition: 0.25s ease;
      min-height: 56px;
    }

    .platform-bar:hover{
      transform: translateY(-1px);
      border-color: rgba(0,234,28,0.34);
      box-shadow: 0 10px 24px rgba(0,234,28,0.08);
    }

    .icon-circle{
      width: clamp(34px, 3.6vw, 46px);
      height: clamp(34px, 3.6vw, 46px);
      flex: 0 0 auto;
      border-radius: 14px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      overflow:hidden;
    }

    .platform-bar:nth-child(1) .icon-circle,
    .platform-bar:nth-child(2) .icon-circle{
      background: #ffffff;
    }

    .icon-circle img{
      width: 72%;
      height: 72%;
      object-fit: contain;
      display:block;
    }

    .name{
      font-size: clamp(14px, 1.8vw, 26px);
      font-weight: 700;
      color: var(--text);
      letter-spacing:-0.02em;
      white-space:nowrap;
    }

    .funnel{
      position:relative;
      min-height: 390px;
      display:grid;
      place-items:center;
    }

    .funnel-core{
      position:relative;
      width:min(150px, 100%);
      height: min(320px, 100%);
      display:grid;
      place-items:center;
    }

    .funnel-line{
      position:absolute;
      left: 0;
      right: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(0,234,28,0.08), rgba(0,234,28,0.92));
      box-shadow: 0 0 18px rgba(0,234,28,0.32);
      transform-origin: right center;
    }

    .funnel-line::after{
      content:'';
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      width: 9px;
      height: 9px;
      border-radius:50%;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(0,234,28,0.9);
    }

    .funnel-line:nth-child(1){ top: 14%; transform: rotate(-20deg); }
    .funnel-line:nth-child(2){ top: 30%; transform: rotate(-11deg); }
    .funnel-line:nth-child(3){ top: 49%; transform: rotate(0deg); }
    .funnel-line:nth-child(4){ top: 68%; transform: rotate(11deg); }
    .funnel-line:nth-child(5){ top: 84%; transform: rotate(20deg); }

    .arrow-badge{
      position:relative;
      z-index:2;
      display:grid;
      place-items:center;
      width: 72px;
      height: 72px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(0,234,28,0.18), rgba(0,234,28,0.08));
      border: 1px solid rgba(0,234,28,0.18);
      box-shadow: 0 0 40px rgba(0,234,28,0.12);
      backdrop-filter: blur(12px);
    }

    .arrow-badge svg{
      width: 34px;
      height: 34px;
      fill: var(--accent);
      filter: drop-shadow(0 0 10px rgba(0,234,28,0.6));
    }

    .destination{
      padding: clamp(14px, 1.8vw, 22px);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap: 14px;
      min-height: 100%;
    }

    .wp-circle{
      width: clamp(112px, 16vw, 190px);
      height: clamp(112px, 16vw, 190px);
      border-radius: 50%;
      display:grid;
      place-items:center;
      background: linear-gradient(135deg, var(--accent) 0%, #19c53b 100%);
      box-shadow:
        0 20px 50px rgba(0,234,28,0.22),
        0 0 80px rgba(0,234,28,0.18),
        inset 0 -8px 12px rgba(0,0,0,0.18);
      position:relative;
    }

    .wp-circle::before{
      content:'';
      position:absolute;
      inset:-5px;
      border-radius:50%;
      border: 1px solid rgba(0,234,28,0.20);
    }

    .wp-circle::after{
      content:'';
      position:absolute;
      inset: 10%;
      border-radius:50%;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.22), transparent 42%);
      pointer-events:none;
    }

    .wp-logo{
      width: 56%;
      height: 56%;
      object-fit:contain;
      position:relative;
      z-index:1;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
    }

    .wp-label{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color: var(--accent);
      font-size: clamp(14px, 1.8vw, 26px);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space:nowrap;
    }

    .wp-label::before,
    .wp-label::after{
      content:'';
      width: 18px;
      height: 1px;
      background: rgba(0,234,28,0.55);
    }

    .bottom-tag{
      display:flex;
      justify-content:center;
      padding-bottom: 2px;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap: 10px;
      justify-content:center;
      max-width: 980px;
    }

    .chip{
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(245,247,251,0.80);
      font-size: clamp(10px, 1.15vw, 14px);
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space:nowrap;
      backdrop-filter: blur(12px);
    }

    /* Tablet */
    @media (max-width: 900px){
      .content{
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .funnel{
        min-height: 120px;
      }

      .funnel-core{
        width: 100%;
        height: 120px;
      }

      .funnel-line:nth-child(1){ top: 44%; left: 12%; right: 12%; transform: rotate(-16deg); }
      .funnel-line:nth-child(2){ top: 48%; left: 10%; right: 10%; transform: rotate(-8deg); }
      .funnel-line:nth-child(3){ top: 52%; left: 8%; right: 8%; transform: rotate(0deg); }
      .funnel-line:nth-child(4){ top: 56%; left: 10%; right: 10%; transform: rotate(8deg); }
      .funnel-line:nth-child(5){ top: 60%; left: 12%; right: 12%; transform: rotate(16deg); }

      .arrow-badge{
        width: 64px;
        height: 64px;
      }
    }

    /* Very small screens, including around 250px */
    @media (max-width: 420px){
      .gig-card{
        width: calc(100vw - 18px);
        border-radius: 22px;
        padding: 12px;
      }

      .eyebrow{
        padding: 6px 10px;
        margin-bottom: 10px;
        letter-spacing: 0.12em;
      }

      .title{
        margin-bottom: 8px;
        line-height: 1.02;
      }

      .subtitle{
        font-size: 10px;
        line-height: 1.35;
      }

      .platforms{
        padding: 10px;
        gap: 9px;
      }

      .platform-bar{
        min-height: 42px;
        padding: 8px 10px;
        border-radius: 12px;
        gap: 9px;
      }

      .icon-circle{
        width: 28px;
        height: 28px;
        border-radius: 10px;
      }

      .name{
        font-size: 11px;
      }

      .funnel{
        min-height: 92px;
      }

      .funnel-core{
        height: 92px;
      }

      .arrow-badge{
        width: 48px;
        height: 48px;
        border-radius: 16px;
      }

      .arrow-badge svg{
        width: 22px;
        height: 22px;
      }

      .destination{
        padding: 10px;
        gap: 10px;
      }

      .wp-circle{
        width: 96px;
        height: 96px;
      }

      .wp-label{
        font-size: 12px;
        letter-spacing: 0.14em;
      }

      .wp-label::before,
      .wp-label::after{
        width: 10px;
      }

      .chips{
        gap: 6px;
      }

      .chip{
        padding: 7px 9px;
        font-size: 9px;
      }

      .decor-dots{
        grid-template-columns: repeat(5, 5px);
        gap: 7px;
      }

      .decor-dots span{
        width:5px;
        height:5px;
      }
    }

    @media (max-width: 330px){
      .subtitle{
        display:none;
      }

      .chips{
        gap: 5px;
      }

      .chip{
        padding: 6px 8px;
        font-size: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="gig-card">
    <div class="decor-dots" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="hero">
      <div class="heading">
        <div class="eyebrow">Website migration specialist</div>
        <div class="title">
          Convert Any Site To <span class="accent">WORDPRESS</span>
        </div>
        <div class="subtitle">
          Pixel-perfect migration from Wix, Squarespace, Lovable, Replit, and Webflow — built to stay responsive, clean, and SEO-safe.
        </div>
      </div>

      <div class="content">
        <div class="panel platforms">
          <div class="platform-bar">
            <div class="icon-circle">
              <img src="../images/logos/wix-logo-1.svg" alt="Wix" />
            </div>
            <div class="name">Wix</div>
          </div>

          <div class="platform-bar">
            <div class="icon-circle">
              <img src="../images/logos/squarespace.svg" alt="Squarespace" />
            </div>
            <div class="name">Squarespace</div>
          </div>

          <div class="platform-bar">
            <div class="icon-circle">
              <img src="../images/logos/lovable-logo-icon.svg" alt="Lovable" />
            </div>
            <div class="name">Lovable</div>
          </div>

          <div class="platform-bar">
            <div class="icon-circle">
              <img src="../images/logos/replit-color.svg" alt="Replit" />
            </div>
            <div class="name">Replit</div>
          </div>

          <div class="platform-bar">
            <div class="icon-circle">
              <img src="../images/logos/webflow.svg" alt="Webflow" />
            </div>
            <div class="name">Webflow</div>
          </div>
        </div>

        <div class="funnel" aria-hidden="true">
          <div class="funnel-core">
            <div class="funnel-line"></div>
            <div class="funnel-line"></div>
            <div class="funnel-line"></div>
            <div class="funnel-line"></div>
            <div class="funnel-line"></div>
            <div class="arrow-badge">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3c4.97 0 9 4.03 9 9s-4.03 9-9 9-9-4.03-9-9 4.03-9 9-9zm1 4h-2v6.17l-2.59-2.58L7 12l5 5 5-5-1.41-1.41L13 13.17V7z"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="panel destination">
          <div class="wp-circle">
            <img class="wp-logo" src="../images/logos/wordpress-2.svg" alt="WordPress" />
          </div>
          <div class="wp-label">WordPress</div>
        </div>
      </div>

      <div class="bottom-tag">
        <div class="chips">
          <div class="chip">Pixel-perfect migration</div>
          <div class="chip">100% responsive</div>
          <div class="chip">SEO preserved</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
