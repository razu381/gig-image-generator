<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Image 1 — Primary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body, .canvas {
      width: 1280px !important;
      min-width: 1280px !important;
      max-width: 1280px !important;
      height: 769px !important;
      overflow: hidden !important;
    }

    body {
      display: flex; align-items: center; justify-content: center;
      background: #252525;
    }

    .canvas {
      background: #1e2525;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* Grid */
    .canvas::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,234,28,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,234,28,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Ambient glows */
    .canvas::after {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 55% 60% at -8% 0%, rgba(0,234,28,0.15) 0%, transparent 65%),
        radial-gradient(ellipse 40% 50% at 108% 100%, rgba(0,234,28,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 35% 45% at 50% -10%, rgba(0,234,28,0.08) 0%, transparent 55%);
    }

    .bg-left-glow {
      position: absolute; inset: 0; z-index: 1;
      background: radial-gradient(circle at 15% 50%, rgba(0,234,28,0.10), rgba(0,0,0,0) 45%);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .font-heading { font-family: 'Syne', sans-serif; }
    .font-mono    { font-family: 'JetBrains Mono', monospace; }
    .text-accent  { color: #00ea1c !important; }
    .text-primary { color: #f0f0f0; }

    /* ── SECTION 1 ── */
    .section-left {
      flex: 1;
      padding-left: 80px;
      padding-right: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .top-badge {
      border: 1px solid rgba(0,234,28,0.2);
      border-radius: 20px; padding: 8px 20px;
      background: rgba(0,234,28,0.04);
      margin-bottom: 32px;
      width: fit-content;
    }
    .top-badge .star { color: #00ea1c; font-size: 20px; }
    .top-badge span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 700;
      color: #00ea1c; text-transform: uppercase; letter-spacing: 0.12em;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; color: #e0e0e0; text-transform: uppercase;
      letter-spacing: 0.2em; margin-bottom: 12px;
    }

    .figma-to {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 600;
      color: #f0f0f0; text-transform: uppercase;
      letter-spacing: 0.14em; margin-bottom: 8px;
    }

    .service-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 80px;
      letter-spacing: -2px;
      line-height: 0.95;
      color: #f0f0f0;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .pixel-badge {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      gap: 12px;
      border: 1px solid rgba(0,234,28,0.1);
      border-radius: 999px; padding: 10px 20px;
      background: rgba(0,234,28,0.04);
      margin-bottom: 40px;
    }
    .pixel-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #00ea1c; flex-shrink: 0; }
    .pixel-badge span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 17px; font-weight: 500;
      color: #00ea1c; text-transform: uppercase; letter-spacing: 0.14em;
    }

    .stack-icons { display: flex; align-items: center; gap: 16px; }
    .stack-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(0,234,28,0.05);
      border: 1px solid rgba(0,234,28,0.2);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* ── SECTION 2 — IMAGE DISPLAY ── */
    .section-right {
      flex: 1;
      position: relative;
      height: 769px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer ambient glow blob behind image */
    .image-glow-outer {
      position: absolute;
      width: 520px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(0,234,28,0.18) 0%,
        rgba(0,234,28,0.06) 45%,
        transparent 70%
      );
      filter: blur(32px);
      z-index: 1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -48%);
    }

    /* Subtle secondary glow offset */
    .image-glow-secondary {
      position: absolute;
      width: 320px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(0,234,28,0.10) 0%,
        transparent 70%
      );
      filter: blur(24px);
      z-index: 1;
      top: 60%;
      left: 52%;
      transform: translate(-50%, -50%);
    }

    /* Image wrapper */
    .image-wrapper {
      position: relative;
      z-index: 3;
      width: 440px;
      height: 500px;
      margin-right: 40px;
    }

    /* Decorative corner rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,234,28,0.12);
      pointer-events: none;
      z-index: 2;
    }
    .ring-1 {
      width: 560px; height: 560px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(0,234,28,0.07);
    }
    .ring-2 {
      width: 480px; height: 480px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(0,234,28,0.10);
    }

    /* The image itself */
    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      border-radius: 16px;
      position: relative;
      z-index: 3;
      /* Subtle inner shadow so edges melt into bg */
      box-shadow:
        0 0 0 1px rgba(0,234,28,0.15),
        0 24px 80px rgba(0,0,0,0.55),
        0 0 60px rgba(0,234,28,0.12);
    }

    /* Gradient overlay — fades bottom & right edges into bg */
    .image-fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 160px;
      background: linear-gradient(to top, #1e2525 0%, transparent 100%);
      border-radius: 0 0 16px 16px;
      z-index: 4;
      pointer-events: none;
    }

    .image-fade-right {
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 100%;
      background: linear-gradient(to left, rgba(30,37,37,0.6) 0%, transparent 100%);
      border-radius: 0 16px 16px 0;
      z-index: 4;
      pointer-events: none;
    }

    .image-fade-left {
      position: absolute;
      top: 0; left: 0;
      width: 40px; height: 100%;
      background: linear-gradient(to right, rgba(30,37,37,0.3) 0%, transparent 100%);
      border-radius: 16px 0 0 16px;
      z-index: 4;
      pointer-events: none;
    }

    /* Decorative scan line accent */
    .scan-line {
      position: absolute;
      left: -20px; right: -20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,234,28,0.3), transparent);
      z-index: 5;
      top: 30%;
      pointer-events: none;
      opacity: 0.5;
    }

    /* Corner accent dots */
    .corner-dot {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00ea1c;
      z-index: 6;
      opacity: 0.7;
    }
    .corner-dot.tl { top: -1px; left: -1px; }
    .corner-dot.tr { top: -1px; right: -1px; }
    .corner-dot.bl { bottom: -1px; left: -1px; }
    .corner-dot.br { bottom: -1px; right: -1px; }

    /* Corner accent lines */
    .corner-accent {
      position: absolute;
      z-index: 6;
      pointer-events: none;
    }
    .corner-accent::before,
    .corner-accent::after {
      content: '';
      position: absolute;
      background: rgba(0,234,28,0.5);
    }
    .corner-accent.tl { top: -1px; left: -1px; }
    .corner-accent.tl::before { width: 24px; height: 1px; top: 0; left: 0; }
    .corner-accent.tl::after  { width: 1px; height: 24px; top: 0; left: 0; }

    .corner-accent.br { bottom: -1px; right: -1px; }
    .corner-accent.br::before { width: 24px; height: 1px; bottom: 0; right: 0; }
    .corner-accent.br::after  { width: 1px; height: 24px; bottom: 0; right: 0; }

    /* Bottom accent line */
    .bottom-accent {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px; z-index: 10;
      background: linear-gradient(90deg, transparent, #00ea1c, transparent);
      opacity: 0.2;
    }
  </style>
</head>
<body>
<div class="canvas">
  <div class="bg-left-glow"></div>

  <!-- ── SECTION 1 — CONTENT ── -->
  <div class="section-left">

    <div class="top-badge">
      <span class="star">★</span>
      <span>70+ FIVE-STAR REVIEWS</span>
    </div>

    <div class="eyebrow">Design-to-Code Conversion</div>

    <p class="figma-to">Figma to</p>

    <h1 class="service-name">
      REACT /<br>
      <span class="text-accent">NEXT.JS</span>
    </h1>

    <div class="pixel-badge">
      <div class="dot"></div>
      <span>PIXEL-PERFECT CONVERSION</span>
    </div>

    <!-- Tech stack icons -->
    <div class="stack-icons">
      <!-- Figma -->
      <div class="stack-icon">
        <svg width="22" height="22" viewBox="0 0 38 57" fill="none">
          <path d="M19 28.5C19 25.48 21.43 23 24.5 23C27.57 23 30 25.48 30 28.5C30 31.52 27.57 34 24.5 34C21.43 34 19 31.52 19 28.5Z" fill="#1ABCFE"/>
          <path d="M8 42.5C8 39.48 10.43 37 13.5 37H19V42.5C19 45.52 16.57 48 13.5 48C10.43 48 8 45.52 8 42.5Z" fill="#0ACF83"/>
          <path d="M19 9V23H24.5C27.57 23 30 20.52 30 17.5C30 14.48 27.57 12 24.5 12H19V9Z" fill="#FF7262"/>
          <path d="M8 17.5C8 20.52 10.43 23 13.5 23H19V12H13.5C10.43 12 8 14.48 8 17.5Z" fill="#F24E1E"/>
          <path d="M8 31.5C8 34.52 10.43 37 13.5 37H19V26H13.5C10.43 26 8 28.48 8 31.5Z" fill="#A259FF"/>
        </svg>
      </div>
      <!-- React -->
      <div class="stack-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="2.2" fill="#61DAFB"/>
          <ellipse cx="12" cy="12" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.1" fill="none"/>
          <ellipse cx="12" cy="12" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.1" fill="none" transform="rotate(60 12 12)"/>
          <ellipse cx="12" cy="12" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.1" fill="none" transform="rotate(120 12 12)"/>
        </svg>
      </div>
      <!-- Next.js -->
      <div class="stack-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="11" fill="#000"/>
          <path d="M7.5 7.5H9.5L16.5 17H14.5L7.5 7.5Z" fill="white"/>
          <path d="M14 7.5H16V14.5L14 12.2V7.5Z" fill="white"/>
        </svg>
      </div>
      <!-- TS -->
      <div class="stack-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="3" fill="#3178C6"/>
          <text x="5" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">TS</text>
        </svg>
      </div>
      <!-- Tailwind -->
      <div class="stack-icon">
        <svg width="24" height="16" viewBox="0 0 54 33" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M27 0C19.8 0 15.3 3.6 13.5 10.8C16.2 7.2 19.35 5.85 22.95 6.75C25.004 7.263 26.472 8.754 28.097 10.403C30.744 13.09 33.808 16.2 40.5 16.2C47.7 16.2 52.2 12.6 54 5.4C51.3 9 48.15 10.35 44.55 9.45C42.496 8.937 41.028 7.446 39.403 5.797C36.756 3.11 33.692 0 27 0ZM13.5 16.2C6.3 16.2 1.8 19.8 0 27C2.7 23.4 5.85 22.05 9.45 22.95C11.504 23.463 12.972 24.954 14.597 26.603C17.244 29.29 20.308 32.4 27 32.4C34.2 32.4 38.7 28.8 40.5 21.6C37.8 25.2 34.65 26.55 31.05 25.65C28.996 25.137 27.528 23.646 25.903 21.997C23.256 19.31 20.192 16.2 13.5 16.2Z" fill="#38BDF8"/>
        </svg>
      </div>
    </div>

  </div>

  <!-- ── SECTION 2 — IMAGE DISPLAY ── -->
  <div class="section-right">

    <!-- Background glow blobs -->
    <div class="image-glow-outer"></div>
    <div class="image-glow-secondary"></div>

    <!-- Decorative rings -->
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>

    <!-- Image wrapper with overlays -->
    <div class="image-wrapper">

      <!-- Corner accents -->
      <div class="corner-accent tl"></div>
      <div class="corner-accent br"></div>
      <div class="corner-dot tl"></div>
      <div class="corner-dot tr"></div>
      <div class="corner-dot bl"></div>
      <div class="corner-dot br"></div>

      <!-- Scan line decoration -->
      <div class="scan-line"></div>

  
      <img
        class="hero-image"
        src="../images/shohidul-i-razu.png"
        alt="Hero image"
      />

      <!-- Edge fades to blend into background -->
      <div class="image-fade-bottom"></div>
      <div class="image-fade-right"></div>
      <div class="image-fade-left"></div>

    </div>

  </div>

  <!-- Bottom accent line -->
  <div class="bottom-accent"></div>

</div>
</body>
</html>
