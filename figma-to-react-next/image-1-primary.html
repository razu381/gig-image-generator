<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Image 1 — Primary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body, .canvas {
      width: 1280px !important;
      min-width: 1280px !important;
      max-width: 1280px !important;
      height: 769px !important;
      overflow: hidden !important;
    }

    body {
      display: flex; align-items: center; justify-content: center;
      background: #252525;
    }

    /* Lightened for better Fiverr thumbnail visibility */
    .canvas {
      background: #1e2525;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* Grid — slightly more visible */
    .canvas::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,234,28,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,234,28,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Brighter ambient glow with multiple light sources for depth */
    .canvas::after {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 55% 60% at -8% 0%, rgba(0,234,28,0.15) 0%, transparent 65%),
        radial-gradient(ellipse 40% 50% at 108% 100%, rgba(0,234,28,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 35% 45% at 50% -10%, rgba(0,234,28,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 30% 40% at 120% 50%, rgba(0,234,28,0.06) 0%, transparent 50%);
    }

    /* ── font aliases ── */
    .font-heading { font-family: 'Syne', sans-serif; }
    .font-mono    { font-family: 'JetBrains Mono', monospace; }

    .text-accent  { color: #00ea1c !important; }
    .text-primary { color: #f0f0f0; }

    /* ── SECTION 1 ── */
    .section-left {
      flex: 1;
      padding-left: 80px;
      padding-right: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .top-badge {
      border: 1px solid rgba(0,234,28,0.2);
      border-radius: 20px; padding: 8px 20px;
      background: rgba(0,234,28,0.04);
      margin-bottom: 32px;
      width: fit-content;
    }
    .top-badge .star { color: #00ea1c; font-size: 18px; }
    .top-badge span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 700;
      color: #00ea1c; text-transform: uppercase; letter-spacing: 0.12em;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #e0e0e0; text-transform: uppercase;
      letter-spacing: 0.2em; margin-bottom: 12px;
    }

    .figma-to {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 600;
      color: #f0f0f0; text-transform: uppercase;
      letter-spacing: 0.14em; margin-bottom: 8px;
    }

    .service-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 80px;
      letter-spacing: -2px;
      line-height: 0.95;
      color: #f0f0f0;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .pixel-badge {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      gap: 12px;
      border: 1px solid rgba(0,234,28,0.1);
      border-radius: 999px; padding: 10px 20px;
      background: rgba(0,234,28,0.04);
      margin-bottom: 40px;
    }
    .pixel-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #00ea1c; flex-shrink: 0; }
    .pixel-badge span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 500;
      color: #00ea1c; text-transform: uppercase; letter-spacing: 0.14em;
    }

    .stack-icons { display: flex; align-items: center; gap: 16px; }
    .stack-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: #111;
      border: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* ── SECTION 2 — browser cards ── */
    .section-right {
      flex: 1;
      position: relative;
      height: 769px;
      z-index: 2;
    }

    .browser-card {
      width: 480px;
      height: 340px;
      position: absolute;
      border-radius: 12px;
      background: #111820;
      overflow: hidden;
    }

    .browser-bar {
      height: 34px;
      background: #161e28;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center;
      padding: 0 14px; gap: 6px; flex-shrink: 0;
    }
    .wdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .wd-r { background: #ff5f57; }
    .wd-y { background: #ffbd2e; }
    .wd-g { background: #28c840; }
    .url-bar {
      flex: 1; height: 20px; background: #1c2530; border-radius: 10px;
      margin: 0 12px; display: flex; align-items: center; padding: 0 10px;
    }
    .url-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: rgba(255,255,255,0.25);
    }

    .screenshot {
      width: 100%;
      height: calc(100% - 34px);
      object-fit: cover;
      object-position: top left;
      display: block;
    }

    /* back card */
    .card-back {
      top: 165px; right: -64px;
      transform: rotate(6deg) scale(0.9);
      opacity: 0.25;
      z-index: 1;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    /* mid card */
    .card-mid {
      top: 215px; right: -20px;
      transform: rotate(3deg);
      opacity: 0.6;
      z-index: 2;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      filter: blur(0.4px);
    }

    /* front card */
    .card-front {
      top: 265px; right: 48px;
      transform: rotate(0deg);
      opacity: 1;
      z-index: 3;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.6),
        0 16px 48px rgba(0,234,28,0.15),
        0 0 0 1px rgba(0,234,28,0.12);
    }

    /* bottom accent */
    .bottom-accent {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px; z-index: 10;
      background: linear-gradient(90deg, transparent, #00ea1c, transparent);
      opacity: 0.2;
    }
  </style>
</head>

  </div>
