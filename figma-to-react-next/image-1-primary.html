<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Image 1 — Primary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../output.css" />
  <style>
    /* Custom styles for non-Tailwind values */
    .service-name {
      font-size: 80px;
      letter-spacing: -2px;
      line-height: 0.95;
    }

    .browser-card {
      width: 480px;
      height: 340px;
    }

    body,
    .canvas {
      width: 1280px !important;
      min-width: 1280px !important;
      max-width: 1280px !important;
      height: 769px !important;
      overflow: hidden !important;
    }

    .text-accent {
      color: #00ea1c !important;
    }

    .bg-accent {
      background-color: #00ea1c !important;
    }

    .border-accent {
      border-color: #00ea1c !important;
    }

    .shadow-accent {
      --tw-shadow-color: #00ea1c !important;
    }

    .from-transparent.via-accent {
      --tw-gradient-stops: transparent, #00ea1c, transparent !important;
    }
  </style>
</head>

<body>
  <div class="canvas bg-grid flex items-center justify-center relative">


    <!-- ── SECTION 1 — CONTENT ── -->
    <div style="padding-left:80px;padding-right:0;" class="flex-1 flex flex-col justify-center relative z-[2]">

      <!-- Top badge (Moved to left) -->
      <div class="mb-8">
        <div class="border border-accent/20 rounded-tag px-5 py-2 bg-accent/4 inline-flex items-center gap-2 shadow-lg">
          <span class="text-accent text-lg">★</span>
          <span class="font-mono text-[12px] font-bold text-accent uppercase tracking-[0.12em]">70+ FIVE-STAR
            REVIEWS</span>
        </div>
      </div>

      <div class="font-mono text-[11px] text-gray-500 uppercase tracking-[0.2em] mb-3">Design-to-Code Conversion</div>

      <p class="font-heading text-[24px] font-semibold text-gray-500 uppercase tracking-[0.14em] mb-2">Figma to</p>

      <h1 class="font-heading font-extrabold text-primary uppercase mb-8 service-name leading-none">
        REACT /<br>
        <span class="text-accent">NEXT.JS</span>
      </h1>

      <!-- Bottom badge -->
      <div class="mb-10">
        <div class="inline-flex items-center gap-3 border border-accent/10 rounded-full px-5 py-2.5 bg-accent/4">
          <div class="w-1.5 h-1.5 rounded-full bg-accent"></div>
          <span class="font-mono text-[11px] text-accent uppercase tracking-[0.14em] font-medium">PIXEL-PERFECT
            CONVERSION</span>
        </div>
      </div>

      <!-- Tech stack icons -->
      <div class="flex items-center gap-4">
        <!-- Figma -->
        <div
          class="w-12 h-12 rounded-full bg-surface-1 border border-white/6 flex items-center justify-center flex-shrink-0">
          <svg width="22" height="22" viewBox="0 0 38 57" fill="none">
            <path
              d="M19 28.5C19 25.48 21.43 23 24.5 23C27.57 23 30 25.48 30 28.5C30 31.52 27.57 34 24.5 34C21.43 34 19 31.52 19 28.5Z"
              fill="#1ABCFE" />
            <path d="M8 42.5C8 39.48 10.43 37 13.5 37H19V42.5C19 45.52 16.57 48 13.5 48C10.43 48 8 45.52 8 42.5Z"
              fill="#0ACF83" />
            <path d="M19 9V23H24.5C27.57 23 30 20.52 30 17.5C30 14.48 27.57 12 24.5 12H19V9Z" fill="#FF7262" />
            <path d="M8 17.5C8 20.52 10.43 23 13.5 23H19V12H13.5C10.43 12 8 14.48 8 17.5Z" fill="#F24E1E" />
            <path d="M8 31.5C8 34.52 10.43 37 13.5 37H19V26H13.5C10.43 26 8 28.48 8 31.5Z" fill="#A259FF" />
          </svg>
        </div>
        <!-- React -->
        <div
          class="w-12 h-12 rounded-full bg-surface-1 border border-white/6 flex items-center justify-center flex-shrink-0">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="2.2" fill="#61DAFB" />
            <ellipse cx="12" cy="12" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.1" fill="none" />
            <ellipse cx="12" cy="12" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.1" fill="none"
              transform="rotate(60 12 12)" />
            <ellipse cx="12" cy="12" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.1" fill="none"
              transform="rotate(120 12 12)" />
          </svg>
        </div>
        <!-- Next.js -->
        <div
          class="w-12 h-12 rounded-full bg-surface-1 border border-white/6 flex items-center justify-center flex-shrink-0">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="11" fill="#000" />
            <path d="M7.5 7.5H9.5L16.5 17H14.5L7.5 7.5Z" fill="white" />
            <path d="M14 7.5H16V14.5L14 12.2V7.5Z" fill="white" />
          </svg>
        </div>
        <!-- TS -->
        <div
          class="w-12 h-12 rounded-full bg-surface-1 border border-white/6 flex items-center justify-center flex-shrink-0">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect width="24" height="24" rx="3" fill="#3178C6" />
            <path d="M13.5 11.5H16.5V13H15.2V18H13.5V11.5Z" fill="white" />
            <path d="M12.5 11.5V13H10.5V18H8.8V13H6.8V11.5H12.5Z" fill="white" />
          </svg>
        </div>
        <!-- Tailwind -->
        <div
          class="w-12 h-12 rounded-full bg-surface-1 border border-white/6 flex items-center justify-center flex-shrink-0">
          <svg width="24" height="16" viewBox="0 0 54 33" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M27 0C19.8 0 15.3 3.6 13.5 10.8C16.2 7.2 19.35 5.85 22.95 6.75C25.004 7.263 26.472 8.754 28.097 10.403C30.744 13.09 33.808 16.2 40.5 16.2C47.7 16.2 52.2 12.6 54 5.4C51.3 9 48.15 10.35 44.55 9.45C42.496 8.937 41.028 7.446 39.403 5.797C36.756 3.11 33.692 0 27 0ZM13.5 16.2C6.3 16.2 1.8 19.8 0 27C2.7 23.4 5.85 22.05 9.45 22.95C11.504 23.463 12.972 24.954 14.597 26.603C17.244 29.29 20.308 32.4 27 32.4C34.2 32.4 38.7 28.8 40.5 21.6C37.8 25.2 34.65 26.55 31.05 25.65C28.996 25.137 27.528 23.646 25.903 21.997C23.256 19.31 20.192 16.2 13.5 16.2Z"
              fill="#38BDF8" />
          </svg>
        </div>
      </div>

    </div>

    <!-- ── SECTION 2 — BROWSER CARDS ── -->
    <div class="flex-1 relative h-[769px] z-[2]">

      <!-- Back card -->
      <div
        class="absolute top-[165px] -right-16 rotate-[6deg] opacity-25 z-[1] shadow-deep browser-card rounded-card bg-surface-1 border border-white/6 overflow-hidden scale-90">
        <div class="h-[34px] bg-surface-2 border-b border-white/6 flex items-center px-[14px] gap-1.5 flex-shrink-0">
          <div class="w-2.5 h-2.5 rounded-full bg-[#ff5f57] flex-shrink-0"></div>
          <div class="w-2.5 h-2.5 rounded-full bg-[#ffbd2e] flex-shrink-0"></div>
          <div class="w-2.5 h-2.5 rounded-full bg-[#28c840] flex-shrink-0"></div>
          <div class="flex-1 h-5 bg-surface-3 rounded-[10px] mx-3 flex items-center px-2.5">
            <span class="font-mono text-[10px] text-ghost">https://taskip.app</span>
          </div>
        </div>
        <div class="bg-[#0b0e14] flex flex-col h-full">
          <div class="h-[40px] bg-[#0b0e14] border-b border-white/5 flex items-center px-5 gap-[14px]">
            <div class="w-[56px] h-2 bg-[#00ea1c] rounded-[2px]"></div>
            <div class="w-[34px] h-[6px] bg-white/12 rounded-[2px]"></div>
          </div>
          <div class="pt-8 px-6 pb-6 flex flex-col gap-3">
            <div class="w-[80%] h-[16px] bg-[#f0f0f0]/90 rounded-[3px]"></div>
            <div class="w-[60%] h-[16px] bg-[#f0f0f0]/90 rounded-[3px]"></div>
            <div class="w-[100px] h-2 bg-white/12 rounded-[2px] mt-2"></div>
          </div>
        </div>
      </div>

      <!-- Mid card -->
      <div
        class="absolute top-[215px] -right-5 rotate-[3deg] opacity-60 z-[2] shadow-deep browser-card rounded-card bg-surface-1 border border-white/6 overflow-hidden blur-[0.4px]">
        <div class="h-[34px] bg-surface-2 border-b border-white/6 flex items-center px-[14px] gap-1.5 flex-shrink-0">
          <div class="w-2.5 h-2.5 rounded-full bg-[#ff5f57] flex-shrink-0"></div>
          <div class="w-2.5 h-2.5 rounded-full bg-[#ffbd2e] flex-shrink-0"></div>
          <div class="w-2.5 h-2.5 rounded-full bg-[#28c840] flex-shrink-0"></div>
          <div class="flex-1 h-5 bg-surface-3 rounded-[10px] mx-3 flex items-center px-2.5">
            <span class="font-mono text-[10px] text-ghost">http://panneauxsandwichdirect.com/</span>
          </div>
        </div>
        <div class="bg-[#0b0e14] flex flex-col h-full">
          <div class="h-[40px] bg-[#0b0e14] border-b border-white/5 flex items-center px-5 gap-[14px]">
            <div class="w-[56px] h-2 bg-[#00ea1c] rounded-[2px]"></div>
            <div class="w-[34px] h-[6px] bg-white/12 rounded-[2px]"></div>
            <div class="w-[34px] h-[6px] bg-white/12 rounded-[2px]"></div>
          </div>
          <div class="pt-8 px-6 pb-6 flex flex-col gap-3">
            <div class="w-[85%] h-[16px] bg-[#f0f0f0]/90 rounded-[3px]"></div>
            <div class="w-[120px] h-[34px] bg-[#00ea1c] rounded-[6px] mt-4"></div>
          </div>
        </div>
      </div>

      <!-- Front card -->
      <div
        style="box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 16px 48px rgba(0,234,28,0.15), 0 0 0 1px rgba(0,234,28,0.12);"
        class="absolute top-[265px] right-12 rotate-0 opacity-100 z-[3] browser-card rounded-card bg-surface-1 overflow-hidden">
        <div class="h-[34px] bg-surface-2 border-b border-white/6 flex items-center px-[14px] gap-1.5 flex-shrink-0">
          <div class="w-2.5 h-2.5 rounded-full bg-[#ff5f57] flex-shrink-0"></div>
          <div class="w-2.5 h-2.5 rounded-full bg-[#ffbd2e] flex-shrink-0"></div>
          <div class="w-2.5 h-2.5 rounded-full bg-[#28c840] flex-shrink-0"></div>
          <div class="flex-1 h-5 bg-surface-3 rounded-[10px] mx-3 flex items-center px-2.5">
            <span class="font-mono text-[10px] text-ghost">https://razu.dev</span>
          </div>
        </div>
        <div class="bg-[#0d1117] flex flex-col h-[306px]">
          <!-- Navbar Mock -->
          <div class="h-[44px] bg-[#0d1117] border-b border-white/5 flex items-center px-5 gap-[14px]">
            <div class="w-[64px] h-2.5 bg-accent rounded-[2px]"></div>
            <div class="ml-auto flex gap-4">
              <div class="w-[28px] h-[5px] bg-white/12 rounded-[2px]"></div>
              <div class="w-[28px] h-[5px] bg-white/12 rounded-[2px]"></div>
            </div>
          </div>
          <!-- Hero Mock -->
          <div class="pt-10 px-6 pb-6 flex flex-col gap-3.5">
            <div class="w-[85%] h-[18px] bg-white rounded-[3px]"></div>
            <div class="w-[60%] h-[18px] bg-white rounded-[3px]"></div>
            <div class="w-[75%] h-[9px] bg-white/18 rounded-[2px] mt-1.5"></div>
            <div class="w-[110px] h-[36px] bg-accent rounded-[6px] mt-5 shadow-lg shadow-accent/20"></div>
          </div>
          <!-- Bottom elements -->
          <div class="flex gap-3 px-6 pb-6 mt-auto">
            <div class="flex-1 h-[68px] bg-white/4 rounded-lg border border-white/6"></div>
            <div class="flex-1 h-[68px] bg-white/4 rounded-lg border border-white/6"></div>
            <div class="flex-1 h-[68px] bg-white/4 rounded-lg border border-white/6"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- Bottom accent line -->
    <div
      class="absolute bottom-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-accent to-transparent opacity-20">
    </div>

  </div>
</body>

</html>
