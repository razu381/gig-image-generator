<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Image 1 — WordPress Websites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/dist/tabler-icons.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #111;
    }

    .canvas {
      width: 1280px;
      height: 769px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #0d0021 0%, #1a0533 40%, #080808 100%);
      display: flex;
    }

    /* Ambient glow — no hard edge */
    .purple-blur {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: rgba(138, 43, 226, 0.18);
      filter: blur(100px);
      top: 50%;
      left: 28%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }

    /* ── LEFT PANEL ── */
    .left-content {
      width: 720px;
      height: 769px;
      padding: 52px 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: rgba(138, 43, 226, 0.85);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 80px;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 0.93;
      letter-spacing: -2px;
    }

    .headline .highlight { color: #00ea1c; }

    /* ── SERVICE TAGS ── */
    .service-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid rgba(0, 234, 28, 0.22);
      background: rgba(0, 234, 28, 0.05);
    }

    .tag__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ea1c;
      flex-shrink: 0;
    }

    .tag__text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: #d4ffd8;
      letter-spacing: 0.04em;
    }

    /* ── STAT BLOCKS ── */
    .stats {
      display: flex;
      gap: 16px;
    }

    .stat-box {
      border: 1px solid rgba(138, 43, 226, 0.28);
      border-radius: 8px;
      padding: 16px 22px;
      background: rgba(138, 43, 226, 0.06);
      min-width: 110px;
    }

    .stat-number {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 34px;
      color: #ffffff;
      line-height: 1;
    }

    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: rgba(138, 43, 226, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 6px;
    }

    /* ── PHOTO SECTION ── */
    .photo-section {
      /* fills the remaining width */
      flex: 1;
      height: 769px;
      position: relative;
      z-index: 2;
    }

    .photo-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      /* Seamless fade: left edge blends into background, right + bottom stay sharp */
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0%,
        rgba(0,0,0,0.3) 12%,
        rgba(0,0,0,0.75) 26%,
        black 44%
      );
      mask-image: linear-gradient(
        to right,
        transparent 0%,
        rgba(0,0,0,0.3) 12%,
        rgba(0,0,0,0.75) 26%,
        black 44%
      );
    }

    /* ── REVIEW BADGE ── */
    .review-badge {
      position: absolute;
      top: 24px;
      right: 24px;
      background: #00ea1c;
      padding: 10px 18px;
      border-radius: 6px;
      z-index: 10;
    }

    .review-badge span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: #080808;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="purple-blur"></div>

    <div class="left-content">
      <div class="eyebrow">WordPress &amp; Elementor Development</div>

      <div class="headline">
        <div>WORDPRESS</div>
        <div class="highlight">WEBSITES</div>
      </div>

      <!-- Restyled as branded tags instead of a plain checklist -->
      <div class="service-tags">
        <div class="tag">
          <div class="tag__dot"></div>
          <span class="tag__text">Figma to WordPress</span>
        </div>
        <div class="tag">
          <div class="tag__dot"></div>
          <span class="tag__text">Elementor Pro</span>
        </div>
        <div class="tag">
          <div class="tag__dot"></div>
          <span class="tag__text">WooCommerce</span>
        </div>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-number">70+</div>
          <div class="stat-label">Reviews</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">19</div>
          <div class="stat-label">Countries</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">5 YRS</div>
          <div class="stat-label">Experience</div>
        </div>
      </div>
    </div>

    <div class="photo-section">
      <img src="../images/shohidul-i-razu.png" alt="Shohidul Islam Razu">
    </div>

    <div class="review-badge">
      <span>★ 70+ Five-Star Reviews</span>
    </div>
  </div>
</body>
</html>
