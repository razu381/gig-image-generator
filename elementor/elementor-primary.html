<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Elementor Gig — Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon:      #ED01EE;
      --codeberry: #620856;
      --pixelbush: #FFB8E5;
      --ink:       #06000b;
      --white:     #F0ECF5;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#000; }

    /* ═══════════════ CANVAS ═══════════════ */
    .canvas {
      width:1280px; height:769px;
      position:relative; overflow:hidden;
      background: var(--ink);
    }

    /* ═══════════════ BACKGROUND ═══════════════ */

    /* Grain texture — premium feel */
    .grain {
      position:absolute; inset:0; z-index:25; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:180px 180px;
      opacity:0.03; mix-blend-mode:screen;
    }

    /* Codeberry deep right sweep */
    .bg-r {
      position:absolute; inset:0; z-index:0;
      background:radial-gradient(ellipse 62% 130% at 115% 55%,
        #3b0333 0%, rgba(98,8,86,0.5) 32%, transparent 60%);
    }
    /* Codeberry top-left corner warmth */
    .bg-tl {
      position:absolute; inset:0; z-index:0;
      background:radial-gradient(ellipse 38% 44% at -2% -2%,
        rgba(98,8,86,0.3) 0%, transparent 65%);
    }
    /* Neon Loop bloom — right of canvas, behind person */
    .bg-halo {
      position:absolute; z-index:1;
      width:500px; height:500px; border-radius:50%;
      background:radial-gradient(circle,
        rgba(237,1,238,0.22) 0%, rgba(237,1,238,0.04) 52%, transparent 68%);
      top:50%; left:80%; transform:translate(-50%,-50%);
    }
    /* Pixel Bush upper-right blush */
    .bg-blush {
      position:absolute; z-index:1;
      width:300px; height:300px; border-radius:50%;
      background:radial-gradient(circle, rgba(255,184,229,0.07) 0%, transparent 68%);
      top:-60px; right:20px;
    }
    /* Neon lower-left flare */
    .bg-flare {
      position:absolute; z-index:1;
      width:260px; height:260px; border-radius:50%;
      background:radial-gradient(circle, rgba(237,1,238,0.1) 0%, transparent 68%);
      bottom:-40px; left:60px;
    }
    /* Vignette framing */
    .bg-vig {
      position:absolute; inset:0; z-index:2;
      background:radial-gradient(ellipse 88% 88% at 50% 50%,
        transparent 38%, rgba(0,0,0,0.5) 100%);
    }
    /* Dot grid — full canvas */
    .bg-dots {
      position:absolute; inset:0; z-index:1;
      background-image:radial-gradient(circle, rgba(237,1,238,0.055) 1px, transparent 1px);
      background-size:30px 30px;
    }
    /* Bottom accent bar */
    .bottom-bar {
      position:absolute; bottom:0; left:0; right:0; height:2px; z-index:20;
      background:linear-gradient(90deg,
        transparent 0%,
        rgba(98,8,86,0.4) 8%,
        var(--neon) 38%,
        rgba(255,184,229,0.45) 54%,
        transparent 74%);
    }

    /* ═══════════════════════════════════════════
       PHOTO — full canvas, mix-blend-mode:lighten
       This makes the black background INVISIBLE.
       Person appears floating over the bg naturally.
    ═══════════════════════════════════════════ */
    .photo-wrap {
      position:absolute; inset:0; z-index:2;
      /* Shift image to the right so face is in right 40% */
      display:flex; justify-content:flex-end;
    }
    .photo-wrap img {
      height:100%;
      width:auto;
      display:block;
      object-fit:cover;
      /* KEY: black bg becomes transparent */
      mix-blend-mode:lighten;
      /* Slight rightward nudge */
      margin-right:-20px;
    }

    /* ═══════════════════════════════════════════
       LEFT CONTENT
       Lives in left 55% = 704px
       Padding 72px each side → text zone = 560px
       overflow:hidden clips anything wider
    ═══════════════════════════════════════════ */
    .left {
      position:absolute;
      top:0; left:0; width:704px; bottom:0;
      padding:0 72px;
      overflow:hidden;
      display:flex; flex-direction:column; justify-content:center; gap:0;
      z-index:10;
    }

    /* — Eyebrow chip — */
    .chip {
      display:inline-flex; align-items:center; gap:8px;
      padding:5px 12px 5px 6px;
      border-radius:3px;
      border:1px solid rgba(237,1,238,0.28);
      background:rgba(237,1,238,0.07);
      width:fit-content;
      margin-bottom:28px;
    }
    .chip__icon {
      width:18px; height:18px; border-radius:3px;
      background:var(--neon);
      box-shadow:0 0 9px rgba(237,1,238,0.65);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .chip__icon svg { width:10px; height:10px; }
    .chip__text {
      font-family:'JetBrains Mono', monospace;
      font-size:9.5px; font-weight:700;
      color:var(--pixelbush); text-transform:uppercase; letter-spacing:0.15em;
    }

    /* — Headline —
       Text zone = 560px
       Syne 800: avg char width ≈ font-size × 0.68
       "ELEMENTOR" (9 chars) at 68px: 9 × 68 × 0.68 = 416px ✓
       "WEBSITES"  (8 chars) at 68px: 8 × 68 × 0.68 = 370px ✓
       Safe with letter-spacing -1.5px
    */
    .headline { margin-bottom:28px; }
    .hl-kicker {
      display:block;
      font-family:'Syne', sans-serif; font-weight:400;
      font-size:12px; letter-spacing:0.42em;
      color:rgba(255,184,229,0.5);
      text-transform:uppercase; margin-bottom:12px;
    }
    .hl-main {
      display:block;
      font-family:'Syne', sans-serif; font-weight:800;
      font-size:90px; line-height:0.86; letter-spacing:-2.5px;
      color:var(--neon);
      text-shadow:
        0 0 24px rgba(237,1,238,0.5),
        0 0 72px rgba(237,1,238,0.15);
      white-space:nowrap;
    }
    .hl-sub {
      display:block;
      font-family:'Syne', sans-serif; font-weight:800;
      font-size:90px; line-height:0.86; letter-spacing:-2.5px;
      color:var(--white);
      white-space:nowrap;
    }

    /* Thin rule */
    .rule {
      width:100%; height:1px;
      background:linear-gradient(90deg,
        rgba(237,1,238,0.5), rgba(237,1,238,0.07) 55%, transparent);
      margin:24px 0;
    }

    /* — Stats — borderless, vertical separators — */
    .stats { display:flex; gap:0; margin-bottom:32px; }
    .stat { flex:1; padding:0 20px; position:relative; }
    .stat:first-child { padding-left:0; }
    .stat + .stat::before {
      content:''; position:absolute;
      left:0; top:4px; bottom:4px; width:1px;
      background:rgba(237,1,238,0.2);
    }
    .stat__num {
      font-family:'Syne', sans-serif; font-weight:800;
      font-size:36px; line-height:1; color:var(--white);
      white-space:nowrap;
    }
    .stat__num em {
      font-style:normal; color:var(--neon); font-size:28px;
    }
    .stat__lbl {
      display:block;
      font-family:'JetBrains Mono', monospace;
      font-size:9px; font-weight:700;
      color:rgba(255,184,229,0.5);
      text-transform:uppercase; letter-spacing:0.18em; margin-top:6px;
    }

    /* — Brand signature — */
    .brand-sig { display:flex; align-items:center; gap:10px; }
    .sig-bar { width:16px; height:1.5px; border-radius:1px; background:var(--neon); flex-shrink:0; }
    .sig-name { font-family:"Syne",sans-serif; font-size:13px; font-weight:700; color:rgba(255,184,229,0.6); letter-spacing:0.06em; }
    .sig-sep { width:1px; height:12px; background:rgba(255,255,255,0.14); flex-shrink:0; }
    .sig-wp { font-family:"JetBrains Mono",monospace; font-size:10px; font-weight:700; color:rgba(255,255,255,0.25); letter-spacing:0.1em; text-transform:uppercase; }

    /* ═══════════════ REVIEW BADGE ═══════════════ */
    .badge {
      position:absolute; top:24px; right:24px; z-index:15;
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 16px; border-radius:3px;
      background:rgba(6,0,11,0.72);
      border:1px solid rgba(237,1,238,0.4);
      backdrop-filter:blur(8px);
    }
    .badge__dot {
      width:5px; height:5px; border-radius:50%;
      background:var(--neon); box-shadow:0 0 6px rgba(237,1,238,0.9); flex-shrink:0;
    }
    .badge__text {
      font-family:"JetBrains Mono",monospace;
      font-size:9.5px; font-weight:700;
      color:var(--pixelbush); letter-spacing:0.09em;
    }
  </style>
</head>
