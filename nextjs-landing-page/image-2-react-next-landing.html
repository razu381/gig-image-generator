<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>Next.js Landing Page Development</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #181818;
      font-family: 'JetBrains Mono', monospace;
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .variant-label {
      width: 1280px;
      padding: 18px 40px;
      background: #111;
      border-bottom: 1px solid rgba(0,234,28,0.12);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .variant-label .num {
      font-size: 11px;
      color: #00ea1c;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.6;
    }
    .variant-label .name {
      font-size: 13px;
      color: #f0f0f0;
      letter-spacing: 0.08em;
    }
    .variant-label .sep { color: rgba(0,234,28,0.3); font-size: 13px; }

    .canvas {
      width: 1280px;
      height: 769px;
      overflow: hidden;
      background: #1e2525;
      display: flex;
      align-items: center;
      position: relative;
      border-bottom: 1px solid rgba(0,234,28,0.08);
    }

    .canvas::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,234,28,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,234,28,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .canvas::after {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 55% 60% at -8% 0%, rgba(0,234,28,0.15) 0%, transparent 65%),
        radial-gradient(ellipse 40% 50% at 108% 100%, rgba(0,234,28,0.12) 0%, transparent 60%);
    }

    .section-left {
      flex: 1;
      padding-left: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
    }
    .top-badge {
      border: 1px solid rgba(0,234,28,0.2);
      border-radius: 20px; padding: 8px 20px;
      background: rgba(0,234,28,0.04);
      margin-bottom: 32px;
      width: fit-content;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-badge .star { color: #00ea1c; font-size: 18px; }
    .top-badge span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 700;
      color: #00ea1c; text-transform: uppercase; letter-spacing: 0.12em;
    }
    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: #a0a0a0; text-transform: uppercase;
      letter-spacing: 0.2em; margin-bottom: 12px;
    }
    .service-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 72px;
      letter-spacing: -2px;
      line-height: 0.95;
      color: #f0f0f0;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .text-accent { color: #00ea1c !important; }
    .text-white { color: #f0f0f0 !important; }
    .pixel-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(0,234,28,0.12);
      border-radius: 999px; padding: 10px 20px;
      background: rgba(0,234,28,0.04);
      margin-bottom: 40px;
      align-self: flex-start;
    }
    .pixel-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #00ea1c; flex-shrink: 0; }
    .pixel-badge span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px; font-weight: 500;
      color: #00ea1c; text-transform: uppercase; letter-spacing: 0.14em;
    }
    .stack-icons { display: flex; align-items: center; gap: 14px; }
    .stack-icon {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(0,234,28,0.05);
      border: 1px solid rgba(0,234,28,0.18);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .section-right {
      flex: 1;
      position: relative;
      height: 769px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a2a1a 0%, #0d1a0d 50%, #0a1510 100%);
      border-radius: inherit;
      position: relative;
      overflow: hidden;
    }
    .hero-img-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 40% 40%, rgba(0,234,28,0.12) 0%, transparent 60%),
        radial-gradient(circle at 70% 70%, rgba(0,234,28,0.06) 0%, transparent 50%);
    }
    .hero-img-placeholder .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(0,234,28,0.5);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      text-align: center;
      line-height: 1.8;
    }

    .v1-wrapper {
      position: relative;
      width: 400px;
      height: 480px;
      margin-right: 60px;
    }

    .v1-card-3 {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: rgba(0,234,28,0.06);
      border: 1px solid rgba(0,234,28,0.18);
      transform: rotate(6deg) translateX(18px) translateY(10px);
      z-index: 1;
    }

    .v1-card-2 {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: rgba(0,234,28,0.04);
      border: 1px solid rgba(0,234,28,0.25);
      transform: rotate(3deg) translateX(9px) translateY(5px);
      z-index: 2;
    }

    .v1-image-card {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      overflow: hidden;
      z-index: 3;
      box-shadow:
        0 0 0 1px rgba(0,234,28,0.2),
        0 24px 60px rgba(0,0,0,0.6),
        0 0 40px rgba(0,234,28,0.10);
    }

    .v1-fade-b {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 140px;
      background: linear-gradient(to top, #1e2525 0%, transparent 100%);
      border-radius: 0 0 14px 14px;
      z-index: 4; pointer-events: none;
    }

    .v1-tag {
      position: absolute;
      bottom: -16px;
      right: -16px;
      background: #00ea1c;
      color: #000;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      z-index: 1;
      transform: rotate(3deg);
    }

    .v1-year {
      position: absolute;
      top: -18px;
      left: -22px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 60px;
      font-weight: 700;
      color: rgba(0,234,28,0.07);
      line-height: 1;
      z-index: 0;
      user-select: none;
      pointer-events: none;
    }

    .bottom-accent {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px; z-index: 10;
      background: linear-gradient(90deg, transparent, #00ea1c, transparent);
      opacity: 0.2;
    }
  </style>
</head>
<body>

  <div class="canvas">
    <!-- LEFT -->
    <div class="section-left">
      <div class="top-badge">
        <span class="star">★</span>
        <span>70+ FIVE-STAR REVIEWS</span>
      </div>
      <div class="eyebrow">Professional Web Development</div>
      <h1 class="service-name">REACT /<br><span class="text-accent">NEXT.JS</span><br><span class="text-white">LANDING PAGES</span></h1>
      <div class="pixel-badge">
        <div class="dot"></div>
        <span>HIGH-CONVERTING DESIGNS</span>
      </div>
      <div class="stack-icons">
        <div class="stack-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="2.2" fill="#61DAFB"/><ellipse cx="12" cy="12" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.1" fill="none"/><ellipse cx="12" cy="12" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.1" fill="none" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.1" fill="none" transform="rotate(120 12 12)"/></svg>
        </div>
        <div class="stack-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="3" fill="#3178C6"/><text x="5" y="18" font-family="Arial" font-size="12" font-weight="bold" fill="white">TS</text></svg>
        </div>
        <div class="stack-icon">
          <svg width="24" height="16" viewBox="0 0 54 33" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M27 0C19.8 0 15.3 3.6 13.5 10.8C16.2 7.2 19.35 5.85 22.95 6.75C25.004 7.263 26.472 8.754 28.097 10.403C30.744 13.09 33.808 16.2 40.5 16.2C47.7 16.2 52.2 12.6 54 5.4C51.3 9 48.15 10.35 44.55 9.45C42.496 8.937 41.028 7.446 39.403 5.797C36.756 3.11 33.692 0 27 0ZM13.5 16.2C6.3 16.2 1.8 19.8 0 27C2.7 23.4 5.85 22.05 9.45 22.95C11.504 23.463 12.972 24.954 14.597 26.603C17.244 29.29 20.308 32.4 27 32.4C34.2 32.4 38.7 28.8 40.5 21.6C37.8 25.2 34.65 26.55 31.05 25.65C28.996 25.137 27.528 23.646 25.903 21.997C23.256 19.31 20.192 16.2 13.5 16.2Z" fill="#38BDF8"/></svg>
        </div>
        <div class="stack-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="3" fill="#06B6D4"/><path d="M5 8H19V16H5V8Z" fill="url(#grad)"/><defs><linearGradient id="grad" x1="5" y1="8" x2="19" y2="16"><stop stop-color="#0EA5E9"/><stop offset="1" stop-color="#6366F1"/></linearGradient></defs></svg>
        </div>
        <div class="stack-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="4" fill="#FF3E00"/><path d="M12 6L6 12L12 18" stroke="white" stroke-width="2" fill="none"/><path d="M18 12L12 18" stroke="white" stroke-width="2" fill="none"/></svg>
        </div>
      </div>
    </div>

    <!-- RIGHT — Stacked Cards -->
    <div class="section-right">
      <div class="v1-wrapper">
        <div class="v1-year">26</div>

        <div class="v1-card-3">
          <div class="v1-tag">SEO OPTIMIZED</div>
        </div>

        <div class="v1-card-2"></div>

        <div class="v1-image-card">
          <img src="../../images/shohidul-i-razu.png" alt="Shohidul I Razu" style="width:100%;height:100%;object-fit:cover;">
          <div class="v1-fade-b"></div>
        </div>
      </div>
    </div>

    <div class="bottom-accent"></div>
  </div>
</body>
</html>
